services:

  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"

  # Deployment Registry API
  deployment-registry:
    build:
      context: .
      dockerfile: deployment-registry/Dockerfile
    container_name: deployment-registry
    ports:
      - "7080:8080"
    environment:
      MONGO_CONNECTION_STRING: mongodb://mongodb:27017
      MONGO_DATABASE: deployments
    depends_on:
      - mongodb

  # Deployment Insights API
  deployment-insights:
    build:
      context: ./deployment-insights
    container_name: deployment-insights
    ports:
      - "7081:3000"
    environment:
      PORT: 3000
      REGISTRY_API_URL: http://deployment-registry:8080
    depends_on:
      - deployment-registry